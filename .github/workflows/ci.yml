name: CI

on:
  push:
    branches: [ master, main ]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  engine-test:
    name: Engine tests (raw API, sqlite, fs, http, auto-stub)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      # The first nix-develop realizes wasi-sdk (a GitHub-release download) and the
      # gradle wrapper distribution — both occasionally 504 from GitHub's CDN, so
      # retry to ride out transient incidents.
      - name: Warm toolchain (wasi-sdk + gradle), retrying transient 504s
        run: |
          for i in 1 2 3 4 5; do
            nix develop -c ./gradlew --version && exit 0
            echo "::warning::warm-up attempt $i failed (transient download?); retrying in 30s"
            sleep 30
          done
          exit 1

      # Build the wasm test fixtures + sqlite + dr_mp3 (downloads sqlite/dr_mp3).
      - name: Build wasm fixtures
        run: |
          for i in 1 2 3; do
            nix develop -c make resources && exit 0
            echo "::warning::fixtures attempt $i failed; retrying in 20s"; sleep 20
          done
          exit 1

      # Raw WebAssembly API (spike), sqlite-via-raw-API, fs + http caps, auto-stub,
      # module resolver, and a real mp3 decode (dr_mp3) — 11 tests.
      - name: Engine tests
        run: nix develop -c ./gradlew :engine:test --console=plain --stacktrace

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: engine-test-report
          path: engine/build/reports/tests/test
          if-no-files-found: ignore

  mod-build:
    name: Fabric mod jar
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main
      - name: Cache Gradle (incl. loom/Minecraft)
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-loom-${{ runner.os }}-${{ hashFiles('**/*.gradle') }}
          restore-keys: gradle-loom-${{ runner.os }}-
      # Loom downloads Minecraft + mappings + CC:Tweaked on first run (slow, cached
      # thereafter). Retry rides out transient GitHub-release 504s (wasi-sdk/gradle).
      - name: Build mod jar (retry transient 504s)
        run: |
          for i in 1 2 3; do
            nix develop -c ./gradlew :mod:build --console=plain --stacktrace && exit 0
            echo "::warning::mod build attempt $i failed; retrying in 30s"; sleep 30
          done
          exit 1
      - name: Upload mod jar
        uses: actions/upload-artifact@v4
        with:
          name: wasm-cc-mod
          path: mod/build/libs/*.jar
          if-no-files-found: error
