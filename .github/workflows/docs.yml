name: Docs

# Build the MkDocs (Material) site and deploy it to GitHub Pages on every push to
# master. The repo maintainer must enable Pages -> "GitHub Actions" as the source
# (Settings -> Pages) for the deploy to go live.

on:
  push:
    branches: [ master ]
  # Allow manual runs from the Actions tab.
  workflow_dispatch:

# Least-privilege permissions for the official Pages deploy action.
permissions:
  contents: read
  pages: write
  id-token: write

# One concurrent deploy; let an in-progress run finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install MkDocs Material (pinned)
        run: pip install -r docs/requirements.txt

      - name: Build (strict)
        run: mkdocs build --strict

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
